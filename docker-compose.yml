name: market-data-platform

services:
  api-server:
    build:
      context: .
      dockerfile: api-server/Dockerfile
    ports:
      - "8090:8090"
    env_file: .env
    networks:
      - default
      - real-time-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api-server
    restart: unless-stopped

# Attach to the network created by real-time-market-data so api-server can
# reach kafka (kafka:29092) and timescaledb (timescaledb:5432).
networks:
  real-time-net:
    external: true
    name: binance-real-time_default
