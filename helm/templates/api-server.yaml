apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: {{ .Values.namespace }}
  labels:
    app: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox
          command: [sh, -c, "until nc -z timescaledb 5432; do echo waiting for timescaledb...; sleep 3; done"]
        - name: wait-for-kafka
          image: busybox
          command: [sh, -c, "until nc -z kafka 29092; do echo waiting for kafka...; sleep 3; done"]
      containers:
        - name: api-server
          image: {{ .Values.images.apiServer.repository }}:{{ .Values.images.apiServer.tag }}
          imagePullPolicy: {{ .Values.images.apiServer.pullPolicy }}
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.timescaledb.url | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.timescaledb.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.timescaledb.password | quote }}
            - name: TIMESCALEDB_URL
              value: {{ .Values.timescaledb.url | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: {{ .Values.namespace }}
  labels:
    app: api-server
spec:
  selector:
    app: api-server
  type: NodePort
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: {{ .Values.apiServer.nodePort }}
