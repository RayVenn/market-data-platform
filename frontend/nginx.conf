server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST API to api-server
    location /api/ {
        proxy_pass http://api-server:8090/api/;
        proxy_set_header Host $host;
    }

    # Proxy WebSocket (SockJS) to api-server — must preserve upgrade headers
    location /ws/ {
        proxy_pass http://api-server:8090/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback: any unknown path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
